<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Confession</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hi pretty, click the button if you want to know my feelings for you</h1>
        <button id="revealButton">Reveal</button>
        <div id="heartContainer" class="hidden">
            <div class="heart">
                <p>I Love You!</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('revealButton').addEventListener('click', function() {
            document.getElementById('heartContainer').classList.remove('hidden');
        });
    </script>
</body>
</html>
